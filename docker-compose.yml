# Default: Postgres only. Run the API on the host: `uvicorn app.main:app --reload --port 8000`
# (set DATABASE_URL to 127.0.0.1 + published port below).
#
# Optional all-in-docker API (unusual):  docker compose --profile docker-api up --build -d

services:
  api:
    profiles: [docker-api]
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://wakeup:wakeup@db:5432/wakeup
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      RESEND_API_KEY: ${RESEND_API_KEY:?set RESEND_API_KEY for outbound mail}
      EMAIL_FROM: ${EMAIL_FROM:-Wakeup Agent <onboarding@resend.dev>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_CC: ${EMAIL_CC:-}
      EMAIL_MIRROR_REPLY_TO_IN_CC: ${EMAIL_MIRROR_REPLY_TO_IN_CC:-false}
      SANDBOX_ALLOWED_TO_EMAILS: ${SANDBOX_ALLOWED_TO_EMAILS:-}
      ENVIRONMENT: development
      CALENDAR_MODE: stub
      STUB_AVAILABLE_SLOTS_ISO: "2026-05-12T14:00:00+00:00,2026-05-13T16:30:00+00:00,2026-05-14T10:00:00+00:00"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wakeup
      POSTGRES_PASSWORD: wakeup
      POSTGRES_DB: wakeup
    ports:
      # Localhost only — use from your terminal: psql/postgres clients on 127.0.0.1
      # Override port if busy: WAKEUP_POSTGRES_PORT=5434 docker compose up -d
      - "127.0.0.1:${WAKEUP_POSTGRES_PORT:-5433}:5432"
    volumes:
      # Dedicated volume for this compose project (avoid reusing other DBs).
      - scr_practice_wakeup_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakeup -d wakeup"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  scr_practice_wakeup_pg:
